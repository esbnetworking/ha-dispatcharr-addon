Replace with this:

name: "Dispatcharr"
slug: "dispatcharr"
description: "Dispatcharr IPTV management"
version: "1.0.0"

startup: services
boot: auto
init: false

arch:
  - aarch64
  - amd64

# Use ports instead of host networking (recommended)
ports:
  9191/tcp: 9191

map:
  - addon_config:rw

options:
  web_port: 9191
  django_secret_key: ""
  log_level: info

schema:
  web_port: port
  django_secret_key: str?
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
