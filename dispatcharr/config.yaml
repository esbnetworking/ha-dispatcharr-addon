name: "Dispatcharr"
slug: "dispatcharr"
description: "Dispatcharr IPTV management"
version: "1.0.0"
startup: services
boot: auto
arch:
  - aarch64
  - amd64
init: false
map:
  - share:rw
host_network: true  # This is the key for Option 2
options:
  web_port: 9191
  log_level: info
schema:
  web_port: port
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
