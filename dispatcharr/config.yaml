name: "Dispatcharr"
slug: "dispatcharr"
description: "Dispatcharr IPTV management"
version: "1.1.10"

startup: services
boot: auto
init: false


video: true
privileged:
  - SYS_ADMIN
  - SYS_RAWIO

ports:
  9191/tcp: 9191

map:
  - data:rw
  - addon_config:rw
  - share:rw
arch:
  - aarch64
  - amd64

schema:
  log_level: list(DEBUG|INFO)?
