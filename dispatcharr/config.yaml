name: "Dispatcharr"
slug: "dispatcharr"
description: "Dispatcharr IPTV management"
version: "1.0.0"
startup: services
boot: auto
arch:
  - aarch64
  - amd64
init: false
map:
  - share:rw
host_network: true
options:
  web_port: 9191
  django_secret_key: "default-random-key-here"
  log_level: info
schema:
  web_port: port
  django_secret_key: str
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
